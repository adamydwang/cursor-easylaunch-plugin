    <path d="M 65 145 L 145 145 L 130 160 L 145 175 L 65 175 Z" fill="url(#flameGrad)" />

    <circle cx="105" cy="153" r="3" fill="#FEF08A" />
    <circle cx="125" cy="168" r="2.5" fill="#FED7AA" />
    <circle cx="90" cy="166" r="3.5" fill="#FECDD3" />

    <path
