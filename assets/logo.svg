<svg
  width="320"
  height="320"
  viewBox="0 0 320 320"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="eGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>

    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="35%" stop-color="#F43F5E" />
      <stop offset="70%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#FDE047" />
    </linearGradient>

    <linearGradient id="rocketGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#CBD5E1" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
        dx="0"
        dy="12"
        stdDeviation="16"
        flood-color="#8B5CF6"
        flood-opacity="0.4"
      />
    </filter>
  </defs>

  <circle cx="160" cy="160" r="140" fill="url(#eGrad)" opacity="0.04" />
  <circle
